name: Build TelegaX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_HASH: ${{ secrets.APP_HASH }}
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/miniconda
          sudo rm -rf /usr/local/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/lib/heroku
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo rm -rf /usr/local/lib/android/sdk/emulator
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get clean

      - name: Remove Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Disable Gradle daemon
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=false" >> ~/.gradle/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.keystore

      - name: Build ARMv7
        run: ./gradlew assembleAfatArm7Release --no-daemon --no-build-cache --stacktrace --info

      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-arm7
          path: TMessagesProj_App/build/outputs/apk/afatArm7/release/*.apk

      - name: Build ARM64
        run: ./gradlew assembleAfatArm64Release --no-daemon --no-build-cache --stacktrace --info

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-arm64
          path: TMessagesProj_App/build/outputs/apk/afatArm64/release/*.apk

      - name: Build X86
        run: ./gradlew assembleAfatX86Release --no-daemon --no-build-cache --stacktrace --info

      - name: Upload X86 APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-x86
          path: TMessagesProj_App/build/outputs/apk/afatX86/release/*.apk

      - name: Build X86_64
        run: ./gradlew assembleAfatX86_64Release --no-daemon --no-build-cache --stacktrace --info

      - name: Upload X86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-x86_64
          path: TMessagesProj_App/build/outputs/apk/afatX86_64/release/*.apk
