name: Build TelegaX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_HASH: ${{ secrets.APP_HASH }}
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔥 ОСВОБОЖДАЕМ 10–12 GB ДИСКА
      - name: Free disk space
  run: |
    sudo rm -rf /usr/share/dotnet
    sudo rm -rf /opt/ghc
    sudo rm -rf /usr/local/share/boost
    sudo rm -rf /usr/local/share/powershell
    sudo rm -rf /usr/local/share/chromium
    sudo rm -rf /usr/local/share/miniconda
    sudo rm -rf /usr/local/share/swift
    sudo rm -rf /usr/local/lib/node_modules
    sudo apt-get clean


      # 🔥 УБИРАЕМ КЭШ GRADLE (экономит 6–8 GB)
      - name: Remove Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 🔥 ДЕКОДИРУЕМ KEYSTORE
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.keystore

      # 🔥 СБОРКА
      - name: Build Release
        run: ./gradlew clean assembleRelease --no-daemon --warning-mode all

      # 🔥 АРТЕФАКТ
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-release
          path: TMessagesProj_App/build/outputs/apk/release/*.apk
