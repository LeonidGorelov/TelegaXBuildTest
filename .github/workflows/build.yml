name: Build TelegaX

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ID: ${{ secrets.APP_ID }}
      APP_HASH: ${{ secrets.APP_HASH }}
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/local/share/miniconda
          sudo rm -rf /usr/local/share/swift
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf /usr/local/lib/heroku
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo rm -rf /usr/local/lib/android/sdk/emulator
          sudo rm -rf /usr/local/lib/android/sdk/ndk-bundle
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo apt-get clean

      - name: Remove Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Disable Gradle daemon
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=false" >> ~/.gradle/gradle.properties

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > TMessagesProj/config/release.keystore

      - name: Read version
        run: echo "VERSION=$(grep '^APP_VERSION_NAME=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Set package to TelegaX
        run: sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=ru.leonidgorelov.telegax/' gradle.properties

      - name: Use TelegaX google-services.json
        run: |
          cp configs/google-services-TelegaX.json TMessagesProj/google-services.json
          cp configs/google-services-App-TelegaX.json TMessagesProj_App/google-services.json

      - name: Build TelegaX ARMv7
        run: ./gradlew assembleAfatArm7Release --no-daemon --no-build-cache

      - name: Build TelegaX ARM64
        run: ./gradlew assembleAfatArm64Release --no-daemon --no-build-cache

      - name: Build TelegaX X86
        run: ./gradlew assembleAfatX86Release --no-daemon --no-build-cache

      - name: Build TelegaX X86_64
        run: ./gradlew assembleAfatX86_64Release --no-daemon --no-build-cache

      - name: Rename TelegaX APKs
        run: |
          mv TMessagesProj_App/build/outputs/apk/afatArm7/release/*.apk TelegaX-${VERSION}-arm7.apk
          mv TMessagesProj_App/build/outputs/apk/afatArm64/release/*.apk TelegaX-${VERSION}-arm64.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86/release/*.apk TelegaX-${VERSION}-x86.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86_64/release/*.apk TelegaX-${VERSION}-x86_64.apk

      - name: Upload TelegaX APKs
        uses: actions/upload-artifact@v4
        with:
          name: TelegaX-${{ env.VERSION }}
          path: |
            TelegaX-${{ env.VERSION }}-arm7.apk
            TelegaX-${{ env.VERSION }}-arm64.apk
            TelegaX-${{ env.VERSION }}-x86.apk
            TelegaX-${{ env.VERSION }}-x86_64.apk

      - name: Set package to FCM
        run: sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=org.telegram.messenger/' gradle.properties

      - name: Use FCM google-services.json
        run: |
          cp configs/google-services-TelegaX-FCM.json TMessagesProj/google-services.json
          cp configs/google-services-App-TelegaX-FCM.json TMessagesProj_App/google-services.json

      - name: Build FCM ARMv7
        run: ./gradlew assembleAfatArm7Release --no-daemon --no-build-cache

      - name: Build FCM ARM64
        run: ./gradlew assembleAfatArm64Release --no-daemon --no-build-cache

      - name: Build FCM X86
        run: ./gradlew assembleAfatX86Release --no-daemon --no-build-cache

      - name: Build FCM X86_64
        run: ./gradlew assembleAfatX86_64Release --no-daemon --no-build-cache

      - name: Rename FCM APKs
        run: |
          mv TMessagesProj_App/build/outputs/apk/afatArm7/release/*.apk FCM-TelegaX-${VERSION}-arm7.apk
          mv TMessagesProj_App/build/outputs/apk/afatArm64/release/*.apk FCM-TelegaX-${VERSION}-arm64.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86/release/*.apk FCM-TelegaX-${VERSION}-x86.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86_64/release/*.apk FCM-TelegaX-${VERSION}-x86_64.apk

      - name: Upload FCM APKs
        uses: actions/upload-artifact@v4
        with:
          name: FCM-TelegaX-${{ env.VERSION }}
          path: |
            FCM-TelegaX-${{ env.VERSION }}-arm7.apk
            FCM-TelegaX-${{ env.VERSION }}-arm64.apk
            FCM-TelegaX-${{ env.VERSION }}-x86.apk
            FCM-TelegaX-${{ env.VERSION }}-x86_64.apk

      - name: Set package to FCM Web
        run: sed -i 's/^APP_PACKAGE=.*/APP_PACKAGE=org.telegram.messenger.web/' gradle.properties

      - name: Use FCM Web google-services.json
        run: |
          cp configs/google-services-TelegaX-FCM.json TMessagesProj/google-services.json
          cp configs/google-services-App-TelegaX-FCM.json TMessagesProj_App/google-services.json

      - name: Build FCM Beta ARMv7
        run: ./gradlew assembleAfatArm7Release --no-daemon --no-build-cache

      - name: Build FCM Beta ARM64
        run: ./gradlew assembleAfatArm64Release --no-daemon --no-build-cache

      - name: Build FCM Beta X86
        run: ./gradlew assembleAfatX86Release --no-daemon --no-build-cache

      - name: Build FCM Beta X86_64
        run: ./gradlew assembleAfatX86_64Release --no-daemon --no-build-cache

      - name: Rename FCM Web APKs
        run: |
          mv TMessagesProj_App/build/outputs/apk/afatArm7/release/*.apk FCM-Web-TelegaX-${VERSION}-arm7.apk
          mv TMessagesProj_App/build/outputs/apk/afatArm64/release/*.apk FCM-Web-TelegaX-${VERSION}-arm64.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86/release/*.apk FCM-Web-TelegaX-${VERSION}-x86.apk
          mv TMessagesProj_App/build/outputs/apk/afatX86_64/release/*.apk FCM-Web-TelegaX-${VERSION}-x86_64.apk

      - name: Upload FCM Beta APKs
        uses: actions/upload-artifact@v4
        with:
          name: FCM-Beta-TelegaX-${{ env.VERSION }}
          path: |
            FCM-Beta-TelegaX-${{ env.VERSION }}-arm7.apk
            FCM-Beta-TelegaX-${{ env.VERSION }}-arm64.apk
            FCM-Beta-TelegaX-${{ env.VERSION }}-x86.apk
            FCM-Beta-TelegaX-${{ env.VERSION }}-x86_64.apk

